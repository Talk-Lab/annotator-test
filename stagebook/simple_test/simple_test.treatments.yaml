introSequences:
  - name: default
    introSteps:
      - name: "Intro"
        elements:
          - type: prompt
            file: intro/intro.prompt.md
          - type: submitButton
            buttonText: "Start"

treatments:
  - name: compare
    gameStages:
      - name: first video
        duration: 600
        elements:
          - type: prompt
            file: video_1_title.prompt.md
          - type: mediaPlayer
            url: ${video_1_url}
            name: video_1
          - type: prompt
            file: liking.prompt.md
            name: liking_1
          - type: submitButton
            buttonText: "Next"

      - name: second video
        duration: 600
        elements:
          - type: prompt
            file: video_2_title.prompt.md
          - type: mediaPlayer
            url: ${video_2_url}
            name: video_2
          - type: prompt
            file: liking.prompt.md
            name: liking_2
          - type: submitButton
            buttonText: "Next"

    exitSequence:
      - name: movie_lover
        elements:
          - type: prompt
            file: movie_lover.prompt.md
            name: movie_lover
          - type: submitButton
            buttonText: "Finish"
